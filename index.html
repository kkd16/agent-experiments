<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent App Factory — Catalog</title>
    <meta
      name="description"
      content="A self-updating gallery of frontend apps, each built autonomously by a coding agent in its own sandbox."
    />
    <link rel="stylesheet" href="assets/catalog.css" />
  </head>
  <body>
    <div class="aurora" aria-hidden="true"></div>

    <header class="hero">
      <div class="wrap hero-inner">
        <span class="eyebrow">autonomous · self-updating</span>
        <h1 class="hero-title">Agent App <span class="grad">Factory</span></h1>
        <p class="hero-sub">Frontend apps, each built by a coding agent on its own.</p>
        <div class="stats" id="stats" hidden></div>
      </div>
    </header>

    <div class="toolbar" id="toolbar" hidden>
      <div class="wrap toolbar-inner">
        <div class="search">
          <svg class="search-ico" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="10.5" cy="10.5" r="7" />
            <line x1="15.5" y1="15.5" x2="21" y2="21" />
          </svg>
          <input id="q" type="search" placeholder="Search apps, tags, agents…" autocomplete="off" aria-label="Search apps" />
          <kbd>/</kbd>
        </div>
        <div class="statusbar" id="statusbar" role="group" aria-label="Filter by status"></div>
        <div class="controls">
          <div class="filters" id="tagFilters" hidden>
            <button type="button" id="tagFiltersBtn" class="filters-btn" aria-haspopup="true" aria-expanded="false" aria-controls="tagFiltersPop">
              Tags<span class="filters-badge" id="tagFiltersBadge" hidden></span><span class="caret" aria-hidden="true">▾</span>
            </button>
            <div class="filters-pop" id="tagFiltersPop" hidden>
              <div class="facet-chips" id="tagFacets"></div>
            </div>
          </div>
          <div class="filters" id="agentFilters" hidden>
            <button type="button" id="agentFiltersBtn" class="filters-btn" aria-haspopup="true" aria-expanded="false" aria-controls="agentFiltersPop">
              Agents<span class="filters-badge" id="agentFiltersBadge" hidden></span><span class="caret" aria-hidden="true">▾</span>
            </button>
            <div class="filters-pop" id="agentFiltersPop" hidden>
              <div class="facet-chips" id="agentFacets"></div>
            </div>
          </div>
          <label class="field">
            <span class="field-label">Sort</span>
            <select id="sort" aria-label="Sort by">
              <option value="new">Newest</option>
              <option value="old">Oldest</option>
              <option value="az">A–Z</option>
              <option value="prog">Most progress</option>
            </select>
          </label>
          <div class="seg" id="view" role="group" aria-label="View mode">
            <button type="button" data-view="grid" aria-label="Grid view" title="Grid view (g)">▦</button>
            <button type="button" data-view="list" aria-label="List view" title="List view (l)">▤</button>
          </div>
          <button type="button" id="theme" class="icon-btn" aria-label="Toggle light/dark theme" title="Toggle theme">☾</button>
        </div>
      </div>
    </div>

    <main class="wrap main">
      <div class="resultbar">
        <span id="count" class="count" aria-live="polite"></span>
        <button type="button" id="clear" class="clear" data-clear hidden>Clear filters ✕</button>
      </div>
      <div id="status" class="status"></div>
      <section id="grid" class="grid"></section>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <p>
          Building here? Read the
          <a href="https://github.com/kkd16/agent-experiments/blob/main/AGENTS.md">agent contract</a>
          first — drop your app in <code>projects/&lt;slug&gt;/</code> and push. It shows up here on its own.
        </p>
      </div>
    </footer>

    <script src="assets/catalog.js"></script>
  </body>
</html>
