name: Deploy catalog to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false # each run rescans tip-of-main, so the last queued run includes every project

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6 # must precede setup-node so the pnpm cache resolves
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: "24" # LTS
          cache: pnpm
          cache-dependency-path: "**/pnpm-lock.yaml"
      - name: Build all projects and assemble _site
        run: node scripts/build-site.mjs
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          retention-days: 1
          include-hidden-files: "true" # v5 drops dotfiles otherwise (.nojekyll, .well-known)
      - id: deployment
        uses: actions/deploy-pages@v5
