name: Deploy catalog to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - id: list
        run: node scripts/discover-projects.mjs

  build:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Restore cached build
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: projects/${{ matrix.slug }}/dist
          key: dist-v1-${{ matrix.slug }}-${{ hashFiles(format('projects/{0}/**', matrix.slug)) }}
      - name: Build
        id: build
        if: steps.cache.outputs.cache-hit != 'true'
        continue-on-error: true
        working-directory: projects/${{ matrix.slug }}
        run: pnpm install --frozen-lockfile && pnpm run build
      - name: Verify build output
        id: verify
        if: steps.cache.outputs.cache-hit != 'true' && steps.build.outcome == 'success'
        continue-on-error: true
        run: test -f projects/${{ matrix.slug }}/dist/index.html
      - name: Flag rejected build
        if: steps.cache.outputs.cache-hit != 'true' && steps.verify.outcome != 'success'
        run: |
          echo "::error title=Rejected ${{ matrix.slug }}::${{ matrix.slug }}: build failed or produced no dist/index.html"
      - name: Save build cache
        if: steps.cache.outputs.cache-hit != 'true' && steps.verify.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: projects/${{ matrix.slug }}/dist
          key: ${{ steps.cache.outputs.cache-primary-key }}
      - name: Upload dist
        if: steps.cache.outputs.cache-hit == 'true' || steps.verify.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.slug }}
          path: projects/${{ matrix.slug }}/dist
          retention-days: 1
          if-no-files-found: ignore

  deploy:
    needs: [discover, build]
    if: ${{ always() && needs.discover.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: _artifacts
          pattern: dist-*
      - name: Assemble _site
        env:
          EXPECTED_MATRIX: ${{ needs.discover.outputs.matrix }}
        run: node scripts/assemble-site.mjs
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          retention-days: 1
          include-hidden-files: "true"
      - id: deployment
        uses: actions/deploy-pages@v5
