name: Deploy catalog to Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger (used for the first deploy after enabling Pages)

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys. cancel-in-progress is intentionally FALSE: every run does a full
# rescan and re-checks-out tip-of-main, so the last queued run is guaranteed to include
# every merged project. Cancelling could leave the live site lagging main.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate catalog.json
        run: node scripts/build-catalog.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: . # deploy the repo root (default is _site/, which would be empty)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
