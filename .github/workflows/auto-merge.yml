name: Auto-merge project pull requests

# Agents publish by opening a pull request into `main`. This workflow runs on
# every PR and merges it automatically — but only if the change is confined to a
# single projects/<slug>/ folder (the Golden Rule) and passes the exact CI gate
# (conformance + lint + build). Anything else is rejected with a failing check
# and a "changes requested" review from the bot, never merged.
#
# Two jobs by design:
#   gate  — runs the PR's untrusted install/lint/build with a READ-ONLY token and
#           no persisted credentials, so a malicious dependency or build script
#           has nothing to steal.
#   merge — holds the write token but runs NO PR code (only GitHub API calls), so
#           the privileged token is never exposed to code the PR controls. It acts
#           on the gate's outputs: merge, or post a changes-requested review.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

# One run per PR; a new push supersedes the previous run.
concurrency:
  group: auto-merge-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  # ── Gate: runs untrusted PR code (install/lint/build) with NO write access ──
  gate:
    # Same-repo, non-draft PRs only. Fork PRs get a read-only token and could run
    # untrusted code, so they're never auto-merged.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PR: ${{ github.event.pull_request.number }}
      BASE: ${{ github.event.pull_request.base.ref }}
    outputs:
      slug: ${{ steps.scope.outputs.slug }}
      skip: ${{ steps.scope.outputs.skip }}
    steps:
      # Check out main (trusted) so the gate scripts run from main, not the PR.
      # persist-credentials: false — this job runs PR code and must hold no token.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Determine merge scope
        id: scope
        run: |
          git fetch origin "$BASE"
          git fetch --no-tags origin "+refs/pull/$PR/head:refs/remotes/origin/pr-head"
          git diff --name-only "origin/$BASE...origin/pr-head" > /tmp/changed.txt
          echo "Changed files vs $BASE:"
          cat /tmp/changed.txt || true
          node scripts/changed-scope.mjs /tmp/changed.txt

      # Out of scope → fail the check loudly. The merge job posts the review.
      - name: Fail — out of scope
        if: steps.scope.outputs.slug == ''
        env:
          SKIP: ${{ steps.scope.outputs.skip }}
        run: |
          echo "::error title=Out of scope::$SKIP"
          exit 1

      - uses: pnpm/action-setup@v6
        if: steps.scope.outputs.slug != ''
        with:
          version: 11

      # Overlay only the PR's project folder; everything else stays at main.
      - name: Overlay the PR's project folder onto main
        if: steps.scope.outputs.slug != ''
        env:
          SLUG: ${{ steps.scope.outputs.slug }}
        run: |
          rm -rf "projects/$SLUG"
          git checkout origin/pr-head -- "projects/$SLUG"

      # The exact gate: scope + conformance + lint + build. A failure here fails
      # the check; the merge job turns it into a changes-requested review.
      - name: Verify project (conformance + lint + build)
        if: steps.scope.outputs.slug != ''
        env:
          SLUG: ${{ steps.scope.outputs.slug }}
        run: node scripts/verify-project.mjs "$SLUG"

  # ── Merge / report: holds the write token, runs NO PR code (API calls only) ──
  merge:
    needs: gate
    if: ${{ always() && (needs.gate.result == 'success' || needs.gate.result == 'failure') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # squash-merge into main
      pull-requests: write # merge + review the PR
      actions: write # dispatch the deploy workflow afterwards
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR: ${{ github.event.pull_request.number }}
      BASE: ${{ github.event.pull_request.base.ref }}
    steps:
      # In scope + gate passed → approve, squash-merge the verified commit, deploy.
      # --match-head-commit pins the merge to the exact SHA the gate verified, so a
      # commit pushed after the gate passed can't slip in unverified.
      - name: Approve and merge
        id: merge
        if: ${{ needs.gate.result == 'success' && needs.gate.outputs.slug != '' }}
        env:
          SLUG: ${{ needs.gate.outputs.slug }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh pr review "$PR" --approve --body "✅ Scope + lint + build passed."
          gh pr merge "$PR" --squash --delete-branch --match-head-commit "$HEAD_SHA"
          gh workflow run deploy.yml --ref main
          echo "Merged PR #$PR (projects/$SLUG) into $BASE."

      # Out of scope → changes-requested review (gate already failed the check).
      - name: Reject — out of scope
        if: ${{ needs.gate.outputs.slug == '' }}
        env:
          SKIP: ${{ needs.gate.outputs.skip }}
        run: |
          # shellcheck disable=SC2016  # %s is a printf placeholder; $SKIP is passed as an arg
          printf '🚫 Out of scope. %s\n\nChange only one `projects/<slug>/` folder, then push again. Run `node scripts/verify-project.mjs <slug>` first — it catches this locally.\n' "$SKIP" > /tmp/body.md
          gh pr review "$PR" --request-changes --body-file /tmp/body.md || gh pr comment "$PR" --body-file /tmp/body.md || true

      # In scope but the gate failed (conformance/lint/build) → changes-requested review.
      - name: Report gate failure
        if: ${{ needs.gate.result == 'failure' && needs.gate.outputs.slug != '' }}
        env:
          SLUG: ${{ needs.gate.outputs.slug }}
        run: |
          # shellcheck disable=SC2016  # %s is a printf placeholder; $SLUG is passed as an arg
          printf '❌ Gate failed for `%s` (conformance / lint / build). Reproduce and fix it locally with `node scripts/verify-project.mjs %s`, then push again.\n' "$SLUG" "$SLUG" > /tmp/body.md
          gh pr review "$PR" --request-changes --body-file /tmp/body.md || gh pr comment "$PR" --body-file /tmp/body.md || true

      # The merge command itself failed (conflict / head moved) → changes-requested review.
      - name: Report merge failure
        if: ${{ failure() && steps.merge.outcome == 'failure' }}
        env:
          SLUG: ${{ needs.gate.outputs.slug }}
        run: |
          # shellcheck disable=SC2016  # %s is a printf placeholder; $SLUG is passed as an arg
          printf '❌ Could not merge `%s` (merge conflict, or the branch changed mid-merge). Rebase on `main`, fix, and push again.\n' "$SLUG" > /tmp/body.md
          gh pr review "$PR" --request-changes --body-file /tmp/body.md || gh pr comment "$PR" --body-file /tmp/body.md || true
